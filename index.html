<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Pit Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#f0f2f5;color:#1c2128;font-family:'Segoe UI',system-ui,sans-serif;font-size:15px;max-width:520px;margin:0 auto;min-height:100vh}
.bar{background:#fff;border-bottom:1px solid #d0d7de;padding:10px 14px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:50;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.logo{font-weight:900;font-size:17px;flex:1}
.pill{padding:3px 8px;border-radius:99px;font-size:11px;font-weight:700}
.live{background:#dafbe1;color:#1a7f37;border:1px solid #82e09a}
.off{background:#f5f7fa;color:#656d76;border:1px solid #d0d7de}
.err{background:#ffebe9;color:#cf222e;border:1px solid #ff8182}
.clk{font-family:monospace;font-size:13px;color:#0969da;font-weight:700}
.bar-btn{padding:6px 12px;border:1px solid #d0d7de;border-radius:8px;background:#fff;cursor:pointer;font-size:12px;font-weight:500;font-family:inherit}
.bar-btn:active{background:#f0f2f5}
.pit-in-btn{display:block;width:calc(100% - 28px);margin:12px 14px 0;padding:15px;font-size:17px;font-weight:800;background:#ffebe9;border:2px solid #ff8182;border-radius:12px;color:#cf222e;cursor:pointer;font-family:inherit;box-shadow:0 2px 8px rgba(207,34,46,.15);text-align:center}
.pit-in-btn:active{transform:scale(.98)}
.grid-wrap{padding:12px 14px}
.grid-label{font-size:10px;font-weight:700;color:#656d76;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.pit-grid{display:flex;gap:10px}
.pit-col{flex:1;display:flex;flex-direction:column;gap:5px;min-width:0}
.col-title{text-align:center;font-size:12px;font-weight:700;color:#656d76;padding:5px 0;background:#fff;border-radius:8px;border:1px solid #d0d7de}
.qlabel{text-align:center;font-size:8px;font-weight:700;letter-spacing:.05em}
.qlabel.top{color:#1a7f37}
.qlabel.bot{color:#cf222e}
.kart{border-radius:10px;border:2.5px solid #d0d7de;padding:10px 5px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:72px;cursor:pointer;position:relative;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.08);user-select:none;transition:transform .1s}
.kart:active{transform:scale(.96)}
.kart.c-green{background:#dafbe1;border-color:#82e09a}
.kart.c-yellow{background:#fff8c5;border-color:#eac54f}
.kart.c-red{background:#ffebe9;border-color:#ff8182}
.kart.c-blue{background:#ddf4ff;border-color:#80ccff}
.kart.c-gray{background:#e8ecf0;border-color:#b0bcc8}
.kpos{position:absolute;top:4px;left:5px;font-size:8px;font-weight:800;color:#1a7f37;opacity:.7}
.kico{position:absolute;top:4px;right:5px;font-size:11px}
.knum{font-size:22px;font-weight:900;line-height:1}
.kart.c-green .knum{color:#1a7f37}
.kart.c-yellow .knum{color:#9a6700}
.kart.c-red .knum{color:#cf222e}
.kart.c-blue .knum{color:#0969da}
.kart.c-gray .knum{color:#6b7585}
.kteam{font-size:8px;color:#656d76;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:90px;text-align:center;margin-top:2px}
.timing-wrap{padding:0 14px 20px}
.timing-list{background:#fff;border-radius:10px;border:1px solid #d0d7de;overflow:hidden}
.timing-row{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid #f5f7fa;cursor:pointer}
.timing-row:last-child{border:none}
.timing-row:active{background:#f5f7fa}
.t-kart{font-weight:900;font-size:15px;min-width:30px}
.t-team{flex:1;font-size:11px;color:#656d76;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.t-avg{font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px;white-space:nowrap}
.t-laps{font-size:10px;color:#888;min-width:24px;text-align:right}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:999;padding:12px}
.modal{background:#fff;border-radius:14px;padding:18px;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.25);max-height:90vh;overflow-y:auto}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.modal-title{font-size:16px;font-weight:800}
.modal-close{font-size:24px;color:#888;cursor:pointer;padding:0 4px;line-height:1}
.pit-car-card{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:10px;border:2.5px solid #d0d7de;margin-bottom:14px}
.pit-car-num{font-size:34px;font-weight:900;line-height:1;min-width:52px;text-align:center}
.pit-car-team{font-size:16px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pit-car-laps{font-size:11px;color:#656d76;margin-top:3px}
.pit-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.pit-stat{background:#f5f7fa;border-radius:8px;padding:10px 8px;text-align:center}
.pit-stat-l{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.pit-stat-v{font-size:20px;font-weight:900}
.laps-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:16px}
.lap-chip{font-size:11px;padding:3px 8px;border-radius:99px;font-weight:700}
.lap-chip.faded{opacity:.45}
.row-btns{display:flex;gap:8px;margin-bottom:14px}
.row-btn{flex:1;padding:14px 6px;border-radius:10px;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer;border:3px solid #d0d7de;background:#fff;color:#1c2128;transition:all .12s;line-height:1.3;text-align:center}
.row-btn.sel{border-color:#1c2128;background:#1c2128;color:#fff;transform:scale(1.06)}
.row-btn:active{transform:scale(.97)}
.row-btn small{display:block;font-weight:400;font-size:9px;margin-top:3px}
input[type=text],input[type=number]{width:100%;padding:11px 12px;border:1px solid #d0d7de;border-radius:8px;font-size:16px;margin-bottom:10px;background:#fff;outline:none;font-family:inherit}
.lbl{font-size:12px;font-weight:600;color:#656d76;margin-bottom:4px}
.color-row{display:flex;gap:8px;margin-bottom:14px}
.color-chip{flex:1;height:44px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;border:3px solid transparent;transition:transform .12s}
.color-chip.sel{border-color:#1c2128;transform:scale(1.1)}
.btns{display:flex;gap:8px;margin-top:4px}
.btn{flex:1;padding:11px;border:1px solid #d0d7de;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;text-align:center}
.btn:active{background:#f0f2f5}
.btn.ok{background:#dafbe1;border-color:#82e09a;color:#1a7f37;font-weight:700}
.btn.danger{background:#ffebe9;border-color:#ff8182;color:#cf222e;font-weight:700}
</style>
</head>
<body>
<div class="bar">
  <div class="logo">🏁 Pit</div>
  <span class="pill off" id="stPill">Підключення…</span>
  <span class="clk" id="stClk"></span>
  <button class="bar-btn" onclick="openTiming()">📊</button>
  <button class="bar-btn" onclick="openSettings()">⚙️</button>
</div>
<button class="pit-in-btn" onclick="startPitIn()">🔧 Піт-ін — машина заїхала</button>
<div class="grid-wrap">
  <div class="grid-label">Піт-лейн</div>
  <div class="pit-grid" id="pitGrid"></div>
</div>
<div class="timing-wrap">
  <div class="grid-label" style="margin-bottom:6px">Live Тайминг · натисни для деталей</div>
  <div class="timing-list" id="timingList"><div style="padding:18px;text-align:center;color:#888;font-size:13px">Підключення до apex-timing…</div></div>
</div>
<div class="overlay" id="overlay" style="display:none" onclick="if(event.target===this)closeOverlay()">
  <div class="modal" id="modal"></div>
</div>
<script>
const WS_URL='wss://www.apex-timing.com:8913/';
let thG=52.3,thY=52.9;
const COLORS=['gray','green','yellow','red','blue'];
const CS={gray:{bg:'#e8ecf0',bd:'#b0bcc8',tx:'#6b7585',em:'⚫'},green:{bg:'#dafbe1',bd:'#82e09a',tx:'#1a7f37',em:'🟢'},yellow:{bg:'#fff8c5',bd:'#eac54f',tx:'#9a6700',em:'🟡'},red:{bg:'#ffebe9',bd:'#ff8182',tx:'#cf222e',em:'🔴'},blue:{bg:'#ddf4ff',bd:'#80ccff',tx:'#0969da',em:'🔵'}};
let nid=10;
let cols=[{id:0,karts:[mk('1'),mk('2'),mk('3')]},{id:1,karts:[mk('4'),mk('5'),mk('6')]},{id:2,karts:[mk('7'),mk('8'),mk('9')]}];
const D={};
let pitSelCol=null,editCtx=null,pickedColor=null;

function mk(num='',color='gray',team=''){return{id:nid++,num:String(num),color,team};}
function fmt(s){if(!s&&s!==0)return'—';const m=Math.floor(s/60),sec=(s%60).toFixed(3);return m>0?`${m}:${sec.padStart(6,'0')}`:sec;}
function parseT(s){if(!s)return null;s=s.trim().replace(/\.$/,'');let m=s.match(/^(\d+):(\d+):(\d+\.?\d*)$/);if(m)return+m[1]*3600+ +m[2]*60+parseFloat(m[3]);m=s.match(/^(\d+):(\d+\.?\d*)$/);if(m)return+m[1]*60+parseFloat(m[2]);const f=parseFloat(s);return isNaN(f)?null:f;}
function cof(s){if(!s)return'gray';if(s<thG)return'green';if(s<thY)return'yellow';return'red';}
function getAvg(d){const h=d.lapHistory||[];const rel=h.length>1?h.slice(0,-1).slice(-5):h.slice(-5);if(!rel.length)return null;return rel.reduce((s,x)=>s+x,0)/rel.length;}
function showModal(html){document.getElementById('modal').innerHTML=html;document.getElementById('overlay').style.display='flex';}
function closeOverlay(){document.getElementById('overlay').style.display='none';editCtx=null;pickedColor=null;pitSelCol=null;}

// WebSocket
let ws,wsDelay=2000,wsDead=false,wsReady=false,wsReadyTimer=null;
function connectWS(){
  const pill=document.getElementById('stPill');
  pill.textContent='…';pill.className='pill off';
  ws=new WebSocket(WS_URL);
  ws.onopen=()=>{ws.send('init');pill.textContent='Live';pill.className='pill live';wsDelay=2000;wsReady=false;clearTimeout(wsReadyTimer);wsReadyTimer=setTimeout(()=>{wsReady=true;},6000);};
  ws.onclose=()=>{wsReady=false;clearTimeout(wsReadyTimer);pill.textContent='Відкл.';pill.className='pill err';if(!wsDead)setTimeout(connectWS,wsDelay);wsDelay=Math.min(wsDelay*2,30000);};
  ws.onerror=()=>ws.close();
  ws.onmessage=e=>parseWS(e.data);
}
function parseWS(raw){
  let dirty=false;
  raw.split('\n').forEach(line=>{
    line=line.trim();
    if(!line||!line.includes('|'))return;
    const p=line.split('|'),key=p[0],field=p[1],val=p[2]||'';
    const m=key.match(/^r(\d+)c(\d+)$/);
    if(m){
      const[,id,col]=m;
      if(!D[id])D[id]={lapHistory:[],status:''};
      const d=D[id];
      if(col==='1'){const prev=d.status;d.status=val;if(val==='in'&&prev!=='in'&&prev!==''&&wsReady)onPitDetected(id,d);}
      else if(col==='2'&&val){d.kart=val;dirty=true;}
      else if(col==='5'){d.team=val.replace(/\s*\[.*?\]/g,'').trim();dirty=true;}
      else if(col==='9'){const s=parseT(val);if(s&&s>20&&s<600&&s!==d.lastLapSec){d.lastLapSec=s;d.lapHistory.push(s);if(d.lapHistory.length>20)d.lapHistory.shift();if(!d.bestLapSec||s<d.bestLapSec)d.bestLapSec=s;dirty=true;}}
      else if(col==='13'){d.laps=val;try{d.rank=parseInt(val);}catch(e){}dirty=true;}
      else if(col==='14')d.onTrack=val.replace(/\.$/,'');
      else if(col==='16')d.pitTime=val;
    }
    if(key==='dyn1'&&field==='text')document.getElementById('stClk').textContent=val;
  });
  if(dirty)renderTiming();
}

// Pit detection
function onPitDetected(id,d){
  if(!d.kart)return;
  const avg=getAvg(d),color=avg?cof(avg):'gray';
  showPitPopup({kart:d.kart,team:d.team||'',laps:d.laps||'?',onTrack:d.onTrack||'',avg,avgFmt:fmt(avg),bestLapSec:d.bestLapSec,bestFmt:fmt(d.bestLapSec),lapHistory:[...d.lapHistory],color});
}

// Manual pit-in
function startPitIn(){
  showModal(`
    <div class="modal-hdr"><span class="modal-title">🔧 Який карт заїхав?</span><span class="modal-close" onclick="closeOverlay()">✕</span></div>
    <div class="lbl">Номер карту (Kart)</div>
    <input type="text" id="pitNumInput" placeholder="напр. 58" inputmode="numeric" onkeydown="if(event.key==='Enter')confirmPitNum()">
    <div class="btns">
      <button class="btn" onclick="closeOverlay()">Скасувати</button>
      <button class="btn danger" onclick="confirmPitNum()">Далі →</button>
    </div>`);
  setTimeout(()=>document.getElementById('pitNumInput')?.focus(),100);
}
function confirmPitNum(){
  const num=document.getElementById('pitNumInput')?.value?.trim();
  if(!num)return;
  const d=Object.values(D).find(x=>x.kart===num);
  const avg=d?getAvg(d):null,color=avg?cof(avg):'gray';
  showPitPopup({kart:num,team:d?.team||'',laps:d?.laps||'?',onTrack:d?.onTrack||'',avg,avgFmt:fmt(avg),bestLapSec:d?.bestLapSec,bestFmt:fmt(d?.bestLapSec),lapHistory:d?[...d.lapHistory]:[],color});
}

function showPitPopup(e){
  pitSelCol=null;
  const c=CS[e.color];
  const lapsHtml=e.lapHistory.length?e.lapHistory.slice(-8).map((s,i,arr)=>{const isLast=i===arr.length-1;const lc=CS[cof(s)];return`<span class="lap-chip${isLast?' faded':''}" style="background:${isLast?'#e8ecf0':lc.bg};color:${isLast?'#888':lc.tx};border:1px solid ${isLast?'#b0bcc8':lc.bd}">${fmt(s)}${isLast?' ↩':''}</span>`;}).join(''):'<span style="font-size:11px;color:#888">—</span>';
  const rowBtns=cols.map((col,ci)=>`<button class="row-btn" id="rbtn${ci}" onclick="selectRow(${ci})">Ряд ${ci+1}<small>${col.karts.length} карт</small></button>`).join('');
  showModal(`
    <div class="modal-hdr"><span class="modal-title">🔧 В який ряд?</span><span class="modal-close" onclick="closeOverlay()">✕</span></div>
    <div class="pit-car-card" style="background:${c.bg};border-color:${c.bd}">
      <div class="pit-car-num" style="color:${c.tx}">#${e.kart}</div>
      <div style="flex:1;min-width:0">
        <div class="pit-car-team">${e.team||'—'}</div>
        <div class="pit-car-laps">Коло ${e.laps}${e.onTrack?' · ⏱'+e.onTrack:''}</div>
      </div>
      <div style="font-size:26px">${c.em}</div>
    </div>
    <div class="pit-stats">
      <div class="pit-stat"><div class="pit-stat-l">Ø 5 кіл (без ост.)</div><div class="pit-stat-v" style="color:${c.tx}">${e.avgFmt}</div></div>
      <div class="pit-stat"><div class="pit-stat-l">↓ Найкраще</div><div class="pit-stat-v" style="color:#1a7f37">${e.bestFmt}</div></div>
    </div>
    <div style="font-size:10px;color:#888;margin-bottom:5px">Останні кола:</div>
    <div class="laps-row">${lapsHtml}</div>
    <div style="font-size:13px;font-weight:700;margin-bottom:8px">В який ряд заїхав?</div>
    <div class="row-btns">${rowBtns}</div>
    <div class="btns">
      <button class="btn" onclick="closeOverlay()">Скасувати</button>
      <button class="btn ok" id="confirmRowBtn" onclick="confirmRow('${e.kart}','${e.team}','${e.color}')" disabled style="opacity:.5;cursor:not-allowed">✓ Додати</button>
    </div>`);
}
function selectRow(ci){
  pitSelCol=ci;
  document.querySelectorAll('.row-btn').forEach((b,i)=>b.className='row-btn'+(i===ci?' sel':''));
  const btn=document.getElementById('confirmRowBtn');
  if(btn){btn.disabled=false;btn.style.opacity='1';btn.style.cursor='pointer';}
}
function confirmRow(kart,team,color){
  if(pitSelCol===null)return;
  const k=mk(kart,color,team);
  cols[pitSelCol].karts=[...cols[pitSelCol].karts.slice(1),k];
  closeOverlay();
  renderGrid();
}

// Edit kart
function openEdit(colIdx,kartId){
  const k=cols[colIdx].karts.find(x=>x.id===kartId);
  if(!k)return;
  editCtx={colIdx,kartId};
  pickedColor=k.color;
  const chips=COLORS.map(c=>`<div class="color-chip${k.color===c?' sel':''}" style="background:${CS[c].bg};border-color:${k.color===c?'#1c2128':CS[c].bd}" onclick="pickColor('${c}',this)">${CS[c].em}</div>`).join('');
  showModal(`
    <div class="modal-hdr"><span class="modal-title">Редагувати карт</span><span class="modal-close" onclick="closeOverlay()">✕</span></div>
    <div class="lbl">Номер</div>
    <input type="text" id="editNum" value="${k.num}" inputmode="numeric">
    <div class="lbl">Колір</div>
    <div class="color-row">${chips}</div>
    <div class="btns">
      <button class="btn" onclick="closeOverlay()">Скасувати</button>
      <button class="btn ok" onclick="confirmEdit()">Зберегти</button>
    </div>`);
}
function pickColor(c,el){
  pickedColor=c;
  document.querySelectorAll('.color-chip').forEach(x=>{x.classList.remove('sel');x.style.borderColor=CS[x.getAttribute('onclick').match(/'([^']+)'/)[1]].bd;});
  el.classList.add('sel');el.style.borderColor='#1c2128';
}
function confirmEdit(){
  if(!editCtx)return;
  const num=document.getElementById('editNum')?.value?.trim();
  const{colIdx,kartId}=editCtx;
  cols[colIdx].karts=cols[colIdx].karts.map(k=>k.id!==kartId?k:{...k,num:num||k.num,color:pickedColor||k.color});
  closeOverlay();renderGrid();
}

// Timing
function openTiming(){
  const list=Object.values(D).filter(d=>d.kart&&d.rank).sort((a,b)=>a.rank-b.rank);
  if(!list.length){alert('Немає даних ще — зачекай кілька секунд після підключення');return;}
  const rows=list.map((d,i)=>{const avg=getAvg(d),c=CS[avg?cof(avg):'gray'];return`<div class="timing-row" onclick="openDriverDetail('${d.kart}')"><span class="t-kart">${d.kart}</span><span class="t-team">${d.team||'—'}</span><span class="t-avg" style="background:${c.bg};color:${c.tx};border:1px solid ${c.bd}">${avg?fmt(avg):'—'}</span><span class="t-laps">${d.laps||'?'}</span></div>`;}).join('');
  showModal(`<div class="modal-hdr"><span class="modal-title">📊 Тайминг</span><span class="modal-close" onclick="closeOverlay()">✕</span></div><div style="border:1px solid #d0d7de;border-radius:8px;overflow:hidden">${rows}</div>`);
}
function openDriverDetail(kart){
  const d=Object.values(D).find(x=>x.kart===kart);
  if(!d)return;
  const avg=getAvg(d),c=CS[avg?cof(avg):'gray'];
  const lapsHtml=d.lapHistory.length?d.lapHistory.slice(-10).map((s,i,arr)=>{const isLast=i===arr.length-1;const lc=CS[cof(s)];return`<span class="lap-chip${isLast?' faded':''}" style="background:${isLast?'#e8ecf0':lc.bg};color:${isLast?'#888':lc.tx};border:1px solid ${isLast?'#b0bcc8':lc.bd}">${fmt(s)}</span>`;}).join(''):'<span style="color:#888;font-size:11px">Даних ще немає</span>';
  showModal(`<div class="modal-hdr"><span class="modal-title">#${kart} · ${d.team||'—'}</span><span class="modal-close" onclick="closeOverlay()">✕</span></div><div style="font-size:11px;color:#888;margin-bottom:12px">Коло ${d.laps||'?'} · On track: ${d.onTrack||'?'}</div><div class="pit-stats"><div class="pit-stat"><div class="pit-stat-l">Ø 5 кіл (без ост.)</div><div class="pit-stat-v" style="color:${c.tx}">${avg?fmt(avg):'—'}</div></div><div class="pit-stat"><div class="pit-stat-l">↓ Найкраще</div><div class="pit-stat-v" style="color:#1a7f37">${d.bestLapSec?fmt(d.bestLapSec):'—'}</div></div></div><div style="font-size:10px;color:#888;margin-bottom:5px">Останні кола:</div><div class="laps-row" style="margin-bottom:14px">${lapsHtml}</div><button class="btn" onclick="closeOverlay()" style="width:100%">Закрити</button>`);
}

// Settings
function openSettings(){
  showModal(`<div class="modal-hdr"><span class="modal-title">⚙️ Пороги кольорів</span><span class="modal-close" onclick="closeOverlay()">✕</span></div><div style="font-size:11px;color:#888;margin-bottom:12px">Середній час кола (секунди)</div><div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span style="font-weight:700;font-size:14px;min-width:110px">🟢 Зелений &lt;</span><input type="number" id="sThG" value="${thG}" step="0.1" style="width:90px"><span style="color:#888">с</span></div><div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span style="font-weight:700;font-size:14px;min-width:110px">🟡 Жовтий &lt;</span><input type="number" id="sThY" value="${thY}" step="0.1" style="width:90px"><span style="color:#888">с</span></div><div style="padding:8px 10px;background:#ffebe9;border-radius:8px;font-size:13px;color:#cf222e;font-weight:700;margin-bottom:14px">🔴 Червоний ≥ ${thY} с</div><button class="btn ok" onclick="saveSettings()" style="width:100%">OK</button>`);
}
function saveSettings(){thG=parseFloat(document.getElementById('sThG')?.value)||thG;thY=parseFloat(document.getElementById('sThY')?.value)||thY;closeOverlay();renderTiming();}

// Render
function renderGrid(){
  const g=document.getElementById('pitGrid');g.innerHTML='';
  cols.forEach((col,ci)=>{
    const div=document.createElement('div');div.className='pit-col';
    div.innerHTML=`<div class="col-title">Ряд ${ci+1}</div><div class="qlabel top">↑ ВИЇЗД</div>${col.karts.map((k,ki)=>`<div class="kart c-${k.color}" onclick="openEdit(${ci},${k.id})">${ki===0?'<div class="kpos">1↑</div>':''}<div class="kico">${CS[k.color].em}</div><div class="knum">#${k.num}</div>${k.team?`<div class="kteam">${k.team.substring(0,12)}</div>`:''}</div>`).join('')}<div class="qlabel bot">↓ ЗАЇЗД</div>`;
    g.appendChild(div);
  });
}
function renderTiming(){
  const list=Object.values(D).filter(d=>d.kart&&d.rank).sort((a,b)=>a.rank-b.rank);
  const el=document.getElementById('timingList');
  if(!list.length){el.innerHTML='<div style="padding:18px;text-align:center;color:#888;font-size:13px">Очікую дані…</div>';return;}
  el.innerHTML=list.map(d=>{const avg=getAvg(d),c=CS[avg?cof(avg):'gray'];return`<div class="timing-row" onclick="openDriverDetail('${d.kart}')"><span class="t-kart">${d.kart}</span><span class="t-team">${d.team||'—'}</span><span class="t-avg" style="background:${c.bg};color:${c.tx};border:1px solid ${c.bd}">${avg?fmt(avg):'—'}</span><span class="t-laps">${d.laps||'?'}</span></div>`;}).join('');
}

renderGrid();
connectWS();
</script>
</body>
</html>
